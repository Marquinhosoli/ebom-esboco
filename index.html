<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EBOM 2026 - Gerador de Esboço Bíblico</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#22c55e">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --bg:#020617;
      --bg-soft:#071226;
      --card:rgba(8,18,38,.88);
      --card-strong:rgba(6,14,28,.94);
      --text:#f8fafc;
      --muted:#94a3b8;
      --primary:#22c55e;
      --primary-hover:#16a34a;
      --primary-dark:#052e16;
      --secondary:#0ea5e9;
      --border:rgba(148,163,184,.18);
      --border-strong:rgba(34,197,94,.28);
      --success:#22c55e;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --glow:0 0 25px rgba(34,197,94,.18);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{min-height:100%}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(2,6,23,.82), rgba(2,6,23,.9)),
        url("ESCOLA BÍBLICA DE OBREIROS CRISTÃO (5).png") center top / cover no-repeat fixed;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 50% 10%, rgba(14,165,233,.18), transparent 30%),
        radial-gradient(circle at 50% 20%, rgba(34,197,94,.12), transparent 35%),
        linear-gradient(180deg, rgba(2,6,23,.25), rgba(2,6,23,.68));
      pointer-events:none;
      z-index:0;
    }

    .wrap{
      width:min(1080px, 94%);
      margin:28px auto 80px; /* Margem aumentada para não cobrir o menu inferior */
      position:relative;
      z-index:1;
    }

    .hero{
      text-align:center;
      margin-bottom:22px;
      padding:26px 18px 18px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:26px;
      background:linear-gradient(180deg, rgba(8,18,38,.72), rgba(8,18,38,.42));
      box-shadow:var(--shadow);
      backdrop-filter:blur(7px);
    }

    .eyebrow{
      display:inline-block;
      letter-spacing:2px;
      font-size:13px;
      color:#dbeafe;
      text-transform:uppercase;
      margin-bottom:10px;
      opacity:.95;
    }

    .hero h1{
      margin:0;
      font-size:clamp(34px, 5vw, 62px);
      line-height:1.06;
      color:#4ade80;
      font-weight:800;
      text-shadow:
        0 0 12px rgba(34,197,94,.22),
        0 0 28px rgba(14,165,233,.14);
    }

    .hero .sub{
      margin:12px auto 0;
      max-width:720px;
      color:#e2e8f0;
      font-size:19px;
      line-height:1.5;
    }

    .steps{
      margin:18px auto 0;
      display:inline-flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
    }

    .step{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#dbeafe;
      font-size:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      margin-bottom:18px;
      backdrop-filter:blur(8px);
    }

    .card-title{
      margin:0 0 16px;
      font-size:20px;
      color:#f8fafc;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    @media (max-width: 860px){
      .grid{ grid-template-columns:1fr; }
    }

    label{
      display:block;
      font-weight:700;
      margin-bottom:8px;
      font-size:14px;
      color:#f8fafc;
    }

    input[type="text"], textarea{
      width:100%;
      border:1px solid rgba(148,163,184,.22);
      border-radius:16px;
      padding:15px 16px;
      font-size:15px;
      outline:none;
      color:#f8fafc;
      background:rgba(255,255,255,.04);
      transition:.2s ease;
    }

    textarea{ min-height:200px; resize:vertical; }

    .upload-box{
      border:1px dashed rgba(148,163,184,.28);
      border-radius:18px;
      padding:16px;
      background:rgba(255,255,255,.03);
    }

    .preview{
      margin-top:14px;
      padding:14px;
      border:1px dashed rgba(148,163,184,.22);
      border-radius:16px;
      background:rgba(255,255,255,.03);
      display:none; 
      flex-wrap: wrap;
      gap: 12px;
    }

    .preview img{
      width: 80px;
      height: 110px;
      object-fit:cover;
      border-radius:8px;
    }

    .actions{ display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }

    button{
      border:none;
      border-radius:16px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{ background:linear-gradient(90deg, #22c55e, #4ade80); color:#052e16; }
    .btn-secondary{ background:rgba(255,255,255,.08); color:#f8fafc; }
    .btn-success{ background:rgba(34,197,94,.14); color:#86efac; }
    .btn-whats{ background:rgba(14,165,233,.14); color:#bae6fd; }

    .result{
      white-space:pre-wrap;
      line-height:1.75;
      font-size:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--border-strong);
      border-radius:18px;
      padding:22px;
      color:#f8fafc;
    }

    /* MENU INFERIOR ESTILO APP */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--card-strong);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      z-index: 1000;
      backdrop-filter: blur(15px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      gap: 4px;
    }

    .nav-item.active { color: var(--primary); }
    .nav-item span:first-child { font-size: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">Escola Bíblica de Obreiros e Membros</div>
      <h1>EBOM 2026</h1>
      <p class="sub">Transforme as suas anotações em esboços prontos para ministrar.</p>
    </div>

    <div class="card">
      <h2 class="card-title">Monte seu esboço</h2>
      <div class="grid">
        <div>
          <label for="tema">Tema</label>
          <input id="tema" type="text" placeholder="Ex.: A fé que persevera" />
        </div>
        <div>
          <label for="textoBase">Texto base</label>
          <input id="textoBase" type="text" placeholder="Ex.: Hebreus 11:1" />
        </div>
      </div>

      <div style="margin-top:16px;">
        <label for="rascunho">Anotações</label>
        <textarea id="rascunho" placeholder="Escreva aqui..."></textarea>
      </div>

      <div style="margin-top:16px;">
        <label for="fotoRascunho">📷 Envie fotos das páginas</label>
        <div class="upload-box">
          <input id="fotoRascunho" type="file" accept="image/*" multiple />
        </div>
        <div class="preview" id="previewBox"></div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="btnGerar">🔥 Gerar Esboço</button>
        <button class="btn-secondary" id="btnLimpar">Limpar</button>
      </div>
      <div class="status" id="status" style="margin-top:10px; font-size:13px; color:#cbd5e1;"></div>
    </div>

    <div class="card">
      <h2 class="card-title">Resultado</h2>
      <div class="result" id="resultado">O esboço aparecerá aqui...</div>
      <div class="actions">
        <button class="btn-secondary" id="btnCopiar">Copiar</button>
        <button class="btn-success" id="btnPDF">Baixar PDF</button>
        <button class="btn-whats" onclick="enviarWhats()">📲 WhatsApp</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="#" class="nav-item active"><span>🏠</span><span>Início</span></a>
    <a href="#rascunho" class="nav-item"><span>📝</span><span>Novo</span></a>
    <a href="javascript:void(0)" id="btnNavPDF" class="nav-item"><span>📄</span><span>PDF</span></a>
  </nav>

  <script>
    const temaEl = document.getElementById('tema');
    const textoBaseEl = document.getElementById('textoBase');
    const rascunhoEl = document.getElementById('rascunho');
    const fotoEl = document.getElementById('fotoRascunho');
    const btnGerar = document.getElementById('btnGerar');
    const btnLimpar = document.getElementById('btnLimpar');
    const btnCopiar = document.getElementById('btnCopiar');
    const btnPDF = document.getElementById('btnPDF');
    const resultadoEl = document.getElementById('resultado');
    const statusEl = document.getElementById('status');
    const previewBox = document.getElementById('previewBox');

    let imagensBase64 = [];

    function comprimirImagem(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1200;
            const scaleSize = MAX_WIDTH / img.width;
            canvas.width = scaleSize < 1 ? MAX_WIDTH : img.width;
            canvas.height = scaleSize < 1 ? img.height * scaleSize : img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.75));
          };
        };
      });
    }

    fotoEl.addEventListener('change', async (e) => {
      const files = e.target.files;
      imagensBase64 = [];
      previewBox.innerHTML = '';
      if (!files.length) { previewBox.style.display = 'none'; return; }
      previewBox.style.display = 'flex';
      statusEl.textContent = 'Otimizando fotos...';
      for (let file of files) {
        const imgComp = await comprimirImagem(file);
        imagensBase64.push(imgComp);
        const imgTag = document.createElement('img');
        imgTag.src = imgComp;
        previewBox.appendChild(imgTag);
      }
      statusEl.textContent = 'Fotos prontas.';
    });

    btnGerar.addEventListener("click", async () => {
      if (!rascunhoEl.value.trim() && !imagensBase64.length) {
        statusEl.textContent = "Adicione texto ou fotos primeiro.";
        return;
      }
      statusEl.textContent = "Gerando...";
      btnGerar.disabled = true;
      try {
        const resp = await fetch("/api/gerar-esboco", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tema: temaEl.value, textoBase: textoBaseEl.value, rascunho: rascunhoEl.value, imagensBase64 })
        });
        const data = await resp.json();
        resultadoEl.textContent = data.esboco;
        statusEl.textContent = "Esboço pronto!";
      } catch (err) {
        statusEl.textContent = "Erro ao gerar.";
      } finally { btnGerar.disabled = false; }
    });

    btnLimpar.onclick = () => { location.reload(); };
    btnCopiar.onclick = () => { navigator.clipboard.writeText(resultadoEl.textContent); statusEl.textContent = "Copiado!"; };

    function gerarPDF() {
      const texto = resultadoEl.textContent;
      if (texto.includes('aparecerá aqui')) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const linhas = doc.splitTextToSize(texto, 180);
      doc.text(linhas, 15, 20);
      doc.save('esboco-ebom.pdf');
    }

    btnPDF.onclick = gerarPDF;
    document.getElementById('btnNavPDF').onclick = gerarPDF;

    function enviarWhats(){
      window.open(`https://wa.me/?text=${encodeURIComponent(resultadoEl.textContent)}`, '_blank');
    }
  </script>
</body>
</html>
